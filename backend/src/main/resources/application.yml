spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/landin_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: admin

server:
  port: 8080

jwt:
  secret: landin-secret-key-must-be-at-least-32-characters-long
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.landin: DEBUG
    org.hibernate.SQL: DEBUG