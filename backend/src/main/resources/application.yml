spring:
  application:
    name: backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    hikari:
      connection-init-sql: "SET NAMES utf8mb4"

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true

server:
  port: ${PORT:8080}

logging:
  level:
    "[com.landin.backend]": DEBUG

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3000}

nfc:
  sdm:
    enabled: ${NFC_SDM_ENABLED:false}
    enc-key: ${NFC_SDM_ENC_KEY:}   # AES-128 SDMMetaReadKey hex (32자) — NXP 태그 설정 시 발급
    mac-key: ${NFC_SDM_MAC_KEY:}   # AES-128 SDMFileReadKey hex (32자) — NXP 태그 설정 시 발급


fabric:
  enabled: ${FABRIC_ENABLED:false}
  channel-name: ${FABRIC_CHANNEL_NAME:channel1}
  chaincode-name: ${FABRIC_CHAINCODE_NAME:visitledger}
  msp-id: ${FABRIC_MSP_ID:Org1MSP}
  peer-endpoint: ${FABRIC_PEER_ENDPOINT:localhost:7051}
  tls-cert-path: ${FABRIC_TLS_CERT_PATH:}
  user-cert-path: ${FABRIC_USER_CERT_PATH:}
  user-key-path: ${FABRIC_USER_KEY_PATH:}
  deadline-seconds: ${FABRIC_DEADLINE_SECONDS:30}

blockchain:
  enabled: ${BLOCKCHAIN_ENABLED:false}
  chain-id: ${BLOCKCHAIN_CHAIN_ID:560048}
  rpc-url: ${BLOCKCHAIN_RPC_URL:https://rpc.hoodi.ethpandaops.io}
  contract-address: ${BLOCKCHAIN_CONTRACT_ADDRESS:0xC4c59a6F57382fc58C93c978b4b78Cf571316453}
  minter-private-key: ${BLOCKCHAIN_MINTER_PRIVATE_KEY:}
  mint-function-name: ${BLOCKCHAIN_MINT_FUNCTION_NAME:safeMint}
  gas-price-wei: ${BLOCKCHAIN_GAS_PRICE_WEI:}
  gas-limit: ${BLOCKCHAIN_GAS_LIMIT:500000}
  receipt-poll-attempts: ${BLOCKCHAIN_RECEIPT_POLL_ATTEMPTS:20}
  receipt-poll-interval-millis: ${BLOCKCHAIN_RECEIPT_POLL_INTERVAL_MILLIS:3000}
