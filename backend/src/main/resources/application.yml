spring:
  application:
    name: backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true

server:
  port: ${PORT:8080}

logging:
  level:
    "[com.landin.backend]": DEBUG

app:
  cors:
    allowed-origin-patterns: http://localhost:5173,http://localhost:3000
