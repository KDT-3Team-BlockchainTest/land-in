spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:${MYSQL_JDBC_URL:jdbc:mysql://${MYSQLHOST:${RAILWAY_PRIVATE_DOMAIN:localhost}}:${MYSQLPORT:3306}/${MYSQLDATABASE:${MYSQL_DATABASE:railway}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${MYSQLUSER:root}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${MYSQLPASSWORD:${MYSQL_ROOT_PASSWORD:}}}}
    driver-class-name: com.mysql.cj.jdbc.Driver

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  public-base-url: ${APP_PUBLIC_BASE_URL}
